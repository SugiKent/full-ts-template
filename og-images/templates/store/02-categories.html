<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist - カテゴリ選択</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #E0F2FE 0%, #F0F9FF 50%, #FFFFFF 100%);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8% 6%;
    }

    /* キャッチコピーエリア */
    .catchphrase {
      text-align: center;
      margin-bottom: 5%;
    }

    .catchphrase h1 {
      font-size: 6.5vw;
      font-weight: 700;
      color: #292524;
      line-height: 1.3;
      margin-bottom: 3%;
    }

    .catchphrase p {
      font-size: 3.5vw;
      color: #78716C;
      font-weight: 500;
    }

    /* モックアプリ画面 */
    .app-screen {
      flex: 1;
      background: #FFFFFF;
      border-radius: 6vw;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3% 5%;
      font-size: 2.8vw;
      font-weight: 600;
      color: #292524;
    }

    .status-bar-icons {
      display: flex;
      gap: 1vw;
    }

    .app-content {
      flex: 1;
      padding: 0 5% 5%;
      overflow: hidden;
    }

    /* オンボーディングヘッダー */
    .onboarding-header {
      text-align: center;
      margin-bottom: 5%;
    }

    .onboarding-header h2 {
      font-size: 5vw;
      font-weight: 700;
      color: #292524;
      margin-bottom: 2%;
    }

    .onboarding-header p {
      font-size: 3vw;
      color: #78716C;
    }

    /* プログレスバー */
    .progress-indicator {
      display: flex;
      justify-content: center;
      gap: 2%;
      margin-bottom: 5%;
    }

    .progress-step {
      width: 12vw;
      height: 0.8vw;
      background: #E7E5E4;
      border-radius: 1vw;
    }

    .progress-step.active {
      background: #0EA5E9;
    }

    .progress-step.completed {
      background: #10B981;
    }

    /* カテゴリグリッド */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 3%;
    }

    .category-item {
      background: #F8FAFC;
      border: 2px solid #E2E8F0;
      border-radius: 3vw;
      padding: 4%;
      text-align: center;
      transition: all 0.2s;
    }

    .category-item.selected {
      background: linear-gradient(135deg, #E0F2FE 0%, #BAE6FD 100%);
      border-color: #0EA5E9;
    }

    .category-item.selected::after {
      content: '✓';
      position: absolute;
      top: 2%;
      right: 2%;
      width: 4vw;
      height: 4vw;
      background: #0EA5E9;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5vw;
      font-weight: bold;
    }

    .category-item {
      position: relative;
    }

    .category-emoji {
      font-size: 7vw;
      margin-bottom: 2%;
    }

    .category-title {
      font-size: 3vw;
      font-weight: 600;
      color: #334155;
    }

    /* CTAボタン */
    .cta-area {
      padding: 5%;
      background: white;
    }

    .cta-button {
      width: 100%;
      background: linear-gradient(135deg, #0EA5E9 0%, #0284C7 100%);
      color: white;
      border: none;
      border-radius: 2vw;
      padding: 4%;
      font-size: 3.5vw;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2%;
    }

    .selected-count {
      background: rgba(255, 255, 255, 0.2);
      padding: 1% 3%;
      border-radius: 3vw;
      font-size: 2.5vw;
    }

    /* アイコンSVG */
    .icon {
      width: 4vw;
      height: 4vw;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- キャッチコピー -->
    <div class="catchphrase">
      <h1>あなたの興味を<br>選んでください</h1>
      <p>プリセットから選ぶだけ、後で自由に追加できます</p>
    </div>

    <!-- モックアプリ画面 -->
    <div class="app-screen">
      <!-- ステータスバー -->
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-bar-icons">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 20V10M12 20V4M6 20v-6"/>
          </svg>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
          </svg>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="6" width="18" height="12" rx="2" ry="2"/>
            <line x1="23" y1="13" x2="23" y2="11"/>
          </svg>
        </div>
      </div>

      <!-- アプリコンテンツ -->
      <div class="app-content">
        <!-- プログレス -->
        <div class="progress-indicator">
          <div class="progress-step completed"></div>
          <div class="progress-step active"></div>
          <div class="progress-step"></div>
          <div class="progress-step"></div>
          <div class="progress-step"></div>
        </div>

        <div class="onboarding-header">
          <h2>カテゴリーを選択</h2>
          <p>興味のあるカテゴリーを選んでください</p>
        </div>

        <!-- カテゴリグリッド -->
        <div class="category-grid">
          <div class="category-item selected">
            <div class="category-emoji">🌍</div>
            <div class="category-title">旅行</div>
          </div>
          <div class="category-item selected">
            <div class="category-emoji">📚</div>
            <div class="category-title">スキル習得</div>
          </div>
          <div class="category-item">
            <div class="category-emoji">🎨</div>
            <div class="category-title">趣味</div>
          </div>
          <div class="category-item selected">
            <div class="category-emoji">💪</div>
            <div class="category-title">健康</div>
          </div>
          <div class="category-item">
            <div class="category-emoji">💼</div>
            <div class="category-title">キャリア</div>
          </div>
          <div class="category-item">
            <div class="category-emoji">💰</div>
            <div class="category-title">お金</div>
          </div>
          <div class="category-item">
            <div class="category-emoji">👥</div>
            <div class="category-title">人間関係</div>
          </div>
          <div class="category-item">
            <div class="category-emoji">🎭</div>
            <div class="category-title">体験</div>
          </div>
        </div>
      </div>

      <!-- CTAエリア -->
      <div class="cta-area">
        <div class="cta-button">
          次へ進む
          <span class="selected-count">3つ選択中</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
