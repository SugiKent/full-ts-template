<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist - 進捗管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #ECFDF5 0%, #F0FDF4 50%, #FFFFFF 100%);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8% 6%;
    }

    /* キャッチコピーエリア */
    .catchphrase {
      text-align: center;
      margin-bottom: 5%;
    }

    .catchphrase h1 {
      font-size: 6vw;
      font-weight: 700;
      color: #292524;
      line-height: 1.3;
      margin-bottom: 3%;
    }

    .catchphrase .highlight {
      color: #10B981;
    }

    .catchphrase p {
      font-size: 3.5vw;
      color: #78716C;
      font-weight: 500;
    }

    /* モックアプリ画面 */
    .app-screen {
      flex: 1;
      background: #FFFFFF;
      border-radius: 6vw;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3% 5%;
      font-size: 2.8vw;
      font-weight: 600;
      color: #292524;
    }

    .status-bar-icons {
      display: flex;
      gap: 1vw;
    }

    .app-content {
      flex: 1;
      padding: 0 5% 5%;
      overflow: hidden;
    }

    /* シートヘッダー */
    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4%;
      padding-top: 2%;
    }

    .sheet-handle {
      width: 10vw;
      height: 0.8vw;
      background: #D1D5DB;
      border-radius: 1vw;
      margin: 0 auto 4%;
    }

    .item-header {
      display: flex;
      gap: 3%;
      align-items: center;
    }

    .item-emoji {
      font-size: 10vw;
    }

    .item-info h2 {
      font-size: 4.5vw;
      font-weight: 700;
      color: #292524;
      margin-bottom: 1%;
    }

    .item-category {
      font-size: 2.8vw;
      color: #78716C;
      display: flex;
      align-items: center;
      gap: 1%;
    }

    /* 進捗サークル */
    .progress-circle-container {
      display: flex;
      justify-content: center;
      margin-bottom: 5%;
    }

    .progress-circle {
      position: relative;
      width: 30vw;
      height: 30vw;
    }

    .progress-circle svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .progress-circle-bg {
      fill: none;
      stroke: #E5E7EB;
      stroke-width: 8;
    }

    .progress-circle-fill {
      fill: none;
      stroke: #10B981;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 283;
      stroke-dashoffset: 57; /* 283 - (283 * 0.8) = 57 for 80% */
    }

    .progress-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .progress-percentage {
      font-size: 7vw;
      font-weight: 700;
      color: #10B981;
    }

    .progress-label {
      font-size: 2.5vw;
      color: #78716C;
    }

    /* ステップリスト */
    .steps-section h3 {
      font-size: 3.5vw;
      font-weight: 600;
      color: #292524;
      margin-bottom: 3%;
    }

    .step-list {
      display: flex;
      flex-direction: column;
      gap: 2%;
    }

    .step-item {
      display: flex;
      align-items: center;
      gap: 3%;
      padding: 3%;
      border-radius: 2vw;
      background: #F8FAFC;
    }

    .step-item.completed {
      background: #ECFDF5;
    }

    .step-checkbox {
      width: 5vw;
      height: 5vw;
      border-radius: 50%;
      border: 2px solid #CBD5E1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-item.completed .step-checkbox {
      background: #10B981;
      border-color: #10B981;
    }

    .step-checkbox svg {
      width: 3vw;
      height: 3vw;
      color: white;
    }

    .step-title {
      font-size: 3vw;
      color: #334155;
    }

    .step-item.completed .step-title {
      color: #10B981;
      text-decoration: line-through;
    }

    /* 次ステップ提案 */
    .next-steps-banner {
      background: linear-gradient(135deg, #ECFDF5 0%, #D1FAE5 100%);
      border: 2px solid #10B981;
      border-radius: 2.5vw;
      padding: 4%;
      margin-top: 4%;
      display: flex;
      align-items: center;
      gap: 3%;
    }

    .next-steps-icon {
      font-size: 6vw;
    }

    .next-steps-content h4 {
      font-size: 3vw;
      font-weight: 600;
      color: #065F46;
      margin-bottom: 1%;
    }

    .next-steps-content p {
      font-size: 2.5vw;
      color: #047857;
    }

    /* アイコンSVG */
    .icon {
      width: 4vw;
      height: 4vw;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- キャッチコピー -->
    <div class="catchphrase">
      <h1>進捗を<span class="highlight">見える化</span><br>して続けられる</h1>
      <p>小さな一歩を積み重ねて、夢に近づく</p>
    </div>

    <!-- モックアプリ画面 -->
    <div class="app-screen">
      <!-- ステータスバー -->
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-bar-icons">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 20V10M12 20V4M6 20v-6"/>
          </svg>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
          </svg>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="6" width="18" height="12" rx="2" ry="2"/>
            <line x1="23" y1="13" x2="23" y2="11"/>
          </svg>
        </div>
      </div>

      <!-- アプリコンテンツ -->
      <div class="app-content">
        <!-- シートハンドル -->
        <div class="sheet-handle"></div>

        <!-- アイテムヘッダー -->
        <div class="sheet-header">
          <div class="item-header">
            <div class="item-emoji">🌍</div>
            <div class="item-info">
              <h2>ヨーロッパ旅行の計画</h2>
              <div class="item-category">
                <span>🌍 旅行</span>
              </div>
            </div>
          </div>
        </div>

        <!-- 進捗サークル -->
        <div class="progress-circle-container">
          <div class="progress-circle">
            <svg viewBox="0 0 100 100">
              <circle class="progress-circle-bg" cx="50" cy="50" r="45"/>
              <circle class="progress-circle-fill" cx="50" cy="50" r="45"/>
            </svg>
            <div class="progress-text">
              <div class="progress-percentage">80%</div>
              <div class="progress-label">4/5 完了</div>
            </div>
          </div>
        </div>

        <!-- ステップリスト -->
        <div class="steps-section">
          <h3>ステップ</h3>
          <div class="step-list">
            <div class="step-item completed">
              <div class="step-checkbox">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </div>
              <div class="step-title">旅行雑誌を買う</div>
            </div>
            <div class="step-item completed">
              <div class="step-checkbox">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </div>
              <div class="step-title">YouTubeで行き先を調べる</div>
            </div>
            <div class="step-item completed">
              <div class="step-checkbox">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </div>
              <div class="step-title">パスポートの有効期限を確認</div>
            </div>
            <div class="step-item completed">
              <div class="step-checkbox">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </div>
              <div class="step-title">予算を計算する</div>
            </div>
            <div class="step-item">
              <div class="step-checkbox"></div>
              <div class="step-title">候補の国を3つ絞る</div>
            </div>
          </div>
        </div>

        <!-- 次ステップ提案バナー -->
        <div class="next-steps-banner">
          <div class="next-steps-icon">🎉</div>
          <div class="next-steps-content">
            <h4>あと1つで80%達成！</h4>
            <p>達成後、次の5ステップを提案します</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
