<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Wishlist - 達成・シェア</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, #FEF3C7 0%, #FFF7ED 30%, #FFFFFF 100%);
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 8% 6%;
    }

    /* キャッチコピーエリア */
    .catchphrase {
      text-align: center;
      margin-bottom: 5%;
    }

    .catchphrase h1 {
      font-size: 6vw;
      font-weight: 700;
      color: #292524;
      line-height: 1.3;
      margin-bottom: 3%;
    }

    .catchphrase .highlight {
      background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .catchphrase p {
      font-size: 3.5vw;
      color: #78716C;
      font-weight: 500;
    }

    /* モックアプリ画面 */
    .app-screen {
      flex: 1;
      background: #FFFFFF;
      border-radius: 6vw;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3% 5%;
      font-size: 2.8vw;
      font-weight: 600;
      color: #292524;
    }

    .status-bar-icons {
      display: flex;
      gap: 1vw;
    }

    .app-content {
      flex: 1;
      padding: 5%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    /* 祝福エリア */
    .celebration {
      margin-bottom: 5%;
    }

    .celebration-emoji {
      font-size: 18vw;
      margin-bottom: 3%;
      animation: bounce 1s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5%); }
    }

    .celebration h2 {
      font-size: 6vw;
      font-weight: 700;
      color: #292524;
      margin-bottom: 2%;
    }

    .celebration p {
      font-size: 3.5vw;
      color: #78716C;
    }

    /* 達成カード */
    .achievement-card {
      width: 100%;
      background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 50%, #FCD34D 100%);
      border-radius: 4vw;
      padding: 6%;
      margin-bottom: 5%;
      position: relative;
      overflow: hidden;
    }

    .achievement-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .achievement-content {
      position: relative;
      z-index: 1;
    }

    .achievement-emoji {
      font-size: 10vw;
      margin-bottom: 3%;
    }

    .achievement-title {
      font-size: 4.5vw;
      font-weight: 700;
      color: #292524;
      margin-bottom: 2%;
    }

    .achievement-date {
      font-size: 3vw;
      color: #78716C;
    }

    /* 紙吹雪 */
    .confetti {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      font-size: 4vw;
      animation: fall 3s linear infinite;
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .confetti-piece:nth-child(1) { left: 10%; animation-delay: 0s; }
    .confetti-piece:nth-child(2) { left: 25%; animation-delay: 0.5s; }
    .confetti-piece:nth-child(3) { left: 40%; animation-delay: 1s; }
    .confetti-piece:nth-child(4) { left: 55%; animation-delay: 0.3s; }
    .confetti-piece:nth-child(5) { left: 70%; animation-delay: 0.8s; }
    .confetti-piece:nth-child(6) { left: 85%; animation-delay: 0.2s; }

    /* シェアボタン */
    .share-section {
      width: 100%;
    }

    .share-title {
      font-size: 3vw;
      color: #78716C;
      margin-bottom: 3%;
    }

    .share-buttons {
      display: flex;
      gap: 3%;
      justify-content: center;
    }

    .share-button {
      flex: 1;
      max-width: 40%;
      padding: 4%;
      border-radius: 2.5vw;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 2%;
      font-size: 3vw;
      font-weight: 600;
      color: white;
    }

    .share-button.instagram {
      background: linear-gradient(135deg, #833AB4 0%, #FD1D1D 50%, #F77737 100%);
    }

    .share-button.twitter {
      background: #1DA1F2;
    }

    .share-button svg {
      width: 4vw;
      height: 4vw;
    }

    /* アイコンSVG */
    .icon {
      width: 4vw;
      height: 4vw;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- キャッチコピー -->
    <div class="catchphrase">
      <h1>達成を<span class="highlight">みんなに</span><br>シェアしよう</h1>
      <p>頑張った自分を祝福して、次の夢へ</p>
    </div>

    <!-- モックアプリ画面 -->
    <div class="app-screen">
      <!-- ステータスバー -->
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-bar-icons">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 20V10M12 20V4M6 20v-6"/>
          </svg>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
          </svg>
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="6" width="18" height="12" rx="2" ry="2"/>
            <line x1="23" y1="13" x2="23" y2="11"/>
          </svg>
        </div>
      </div>

      <!-- 紙吹雪 -->
      <div class="confetti">
        <span class="confetti-piece">🎉</span>
        <span class="confetti-piece">✨</span>
        <span class="confetti-piece">🌟</span>
        <span class="confetti-piece">💫</span>
        <span class="confetti-piece">🎊</span>
        <span class="confetti-piece">⭐</span>
      </div>

      <!-- アプリコンテンツ -->
      <div class="app-content">
        <!-- 祝福エリア -->
        <div class="celebration">
          <div class="celebration-emoji">🏆</div>
          <h2>おめでとうございます！</h2>
          <p>ウィッシュリストを達成しました</p>
        </div>

        <!-- 達成カード -->
        <div class="achievement-card">
          <div class="achievement-content">
            <div class="achievement-emoji">🌍</div>
            <div class="achievement-title">ヨーロッパ旅行の計画</div>
            <div class="achievement-date">2026年1月15日 達成</div>
          </div>
        </div>

        <!-- シェアセクション -->
        <div class="share-section">
          <div class="share-title">SNSでシェアする</div>
          <div class="share-buttons">
            <div class="share-button instagram">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/>
              </svg>
              Instagram
            </div>
            <div class="share-button twitter">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
              </svg>
              X
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
